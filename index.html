<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
        <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">

    </head>
    <body>
        <span id="sound-section">
            <label for="search">Search for sounds</label>
            <input type="search" id="search">
            <button id="button">Search</button>
            <div id="result"></div>
        </span>
        <span id="hand-section">
            <div id="liveView" class="videoView">
                <button id="webcamButton" class="mdc-button mdc-button--raised">
                    <span class="mdc-button__ripple"></span>
                    <span class="mdc-button__label">ENABLE WEBCAM</span>
                </button>
                <div id="webcam-container" style="position: relative;">
                    <video id="webcam" style="position: absolute" autoplay playsinline></video>
                    <canvas class="output_canvas" id="output_canvas" style="position: absolute; left: 0px; top: 0px;"></canvas>
                </div>
            </div>

        </span>
        
        <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script> 
        <script src="script.js"></script>
        <script src="hands.js" type="module"></script>
    </body>
</html>
